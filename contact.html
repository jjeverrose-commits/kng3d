<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact – KNG 3D Printing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ------------------------------
   GLOBAL NEON BACKGROUND
--------------------------------*/
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg, #050510, #001f29, #0b0b1a);
  background-size: 300% 300%;
  animation: contactBgMove 18s ease infinite;
  color: white;
}

/* Animated gradient */
@keyframes contactBgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ------------------------------
   PAGE CONTAINER
--------------------------------*/
.contact-page {
  max-width: 900px;
  margin: 60px auto;
  padding: 20px;
}

/* ------------------------------
   TITLE
--------------------------------*/
.contact-title {
  font-size: 3rem;
  text-align: center;
  color: cyan;
  text-shadow: 0 0 20px cyan;
  animation: neonFlicker 3.5s linear infinite;
}

/* Flicker animation */
@keyframes neonFlicker {
  0%, 19%, 21%, 23%, 80%, 100% { opacity: 1; }
  20% { opacity: 0.4; }
  22% { opacity: 0.1; }
  24% { opacity: 0.6; }
  81% { opacity: 0.3; }
}

/* ------------------------------
   CONTACT BOX
--------------------------------*/
.contact-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid cyan;
  border-radius: 12px;
  padding: 30px;
  margin-top: 40px;
  backdrop-filter: blur(10px);
  animation: glassFade 1.2s ease forwards;
}

/* Fade-in animation */
@keyframes glassFade {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ------------------------------
   BUTTONS
--------------------------------*/
.contact-btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  background: transparent;
  border: 2px solid cyan;
  color: cyan;
  font-size: 1.2rem;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  animation: neonPulse 2.4s ease-in-out infinite;
}

/* Glow pulse */
@keyframes neonPulse {
  0% { box-shadow: 0 0 6px rgba(0,229,255,0.4); }
  50% { box-shadow: 0 0 22px rgba(0,229,255,0.9); }
  100% { box-shadow: 0 0 6px rgba(0,229,255,0.4); }
}

/* Hover wave */
.contact-btn:hover {
  animation: hoverWave 0.6s ease;
  background: cyan;
  color: black;
}

@keyframes hoverWave {
  0% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}

/* ------------------------------
   FORM
--------------------------------*/
form input, form textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid cyan;
  border-radius: 8px;
  color: white;
  font-size: 1rem;
  animation: neonPulse 2.4s ease-in-out infinite;
}

form textarea {
  height: 140px;
}

form button {
  margin-top: 20px;
}

</style>
</head>

<body>

<div class="contact-page">

  <h1 class="contact-title">Contact KNG 3D Printing</h1>

  <div class="contact-box">

    <h2 style="color: cyan; text-shadow: 0 0 10px cyan;">Email Options</h2>

    <button class="contact-btn" onclick="window.location.href='mailto:kainjohnianjones@gmail.com'">
      Request a Print – kainjohnianjones@gmail.com
    </button>

    <button class="contact-btn" onclick="window.location.href='mailto:jjeverrose@gmail.com'">
      Support – jjeverrose@gmail.com
    </button>

    <hr style="border: 1px solid cyan; margin: 30px 0;">

    <h2 style="color: cyan; text-shadow: 0 0 10px cyan;">Send a Message</h2>

    <form action="mailto:kainjohnianjones@gmail.com" method="POST" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Name">
      <input type="email" name="email" placeholder="Your Email">
      <textarea name="message" placeholder="Your Message"></textarea>
      <button class="contact-btn" type="submit">Send Message</button>
    </form>

  </div>

</div>

</body>
</html>
